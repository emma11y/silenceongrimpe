@if (error) {
  <div class="error-component container">
    <div class="error-component-content">
      <p class="error-component-content-description">{{ error.description }}</p>
      @if (error.code) {
        <p class="error-component-content-code">
          ERREUR {{ error.code }}
        </p>
      }
      <a class="error-component-content-link" routerLink="/">
        Retour à l'accueil
      </a>
    </div>
  </div>
}
